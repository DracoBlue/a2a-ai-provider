name: CI

on:
  push:
    branches:
      - '*'
  pull_request:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: '9.15.3'
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install Dependencies
        run: pnpm install


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Boot a2a tck server
        run: .github/scripts/start-tck-server.sh -d

      - name: Lint Package
        run: pnpm run lint

      - name: Run Tests
        run: pnpm run test

      - name: Stop a2a tck server
        run: docker rm -f a2a-tck-server

      - name: Build Package
        run: pnpm run build

